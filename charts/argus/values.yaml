# Default values for argus.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/uninett/argus
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: 2.8.1

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "haproxy"
  annotations: {}
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: argus.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: argus-tls
  #    hosts:
  #      - argus.local

readinessProbe:
  httpGet:
    path: /
    port: http

livenessProbe:
  httpGet:
    path: /
    port: http

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

postgresql:
  enabled: true
  global:
    postgresql:
      auth:
        database: ""
        username: ""
        password: ""
        existingSecret: ""
        secretKeys:
          userPasswordKey: ""
      service:
        ports:
          postgresql: 5432

argus:
  # This is the port that Argus will listen on. This also configuers which port the container listens to, since they have to match.
  port: 8000
  staticRoot: "/static/"
  debug: "false"
  djangoSettingsModule : "dockersettings"
  frontendUrl: "http://localhost:8000"
  timeZone: "Europe/Oslo"
  emailHost: "email.example.com"
  emailPort: 587
  emailUseTLS: "true"
  defaultFromEmail: "noreply@example.com"
  djangoLoggingModule: ""
  sendNotifications: "true"

  # Name of configmap containing Django settings module.
  # argus.djangoSettingsModule must match the name of the file defined in the configmap, without the .py extension.
  # For example, if the configmap contains a file called "mysettings.py", then argus.djangoSettingsModule should be set to "argussettings.mysettings".
  # argussettings is the folder the configmap is mounted to.
  djangoSettingsModuleConfigMap: ""

  # Name of configmap containing Django logging module.
  # argus.djangoLoggingModule must match the name of the file defined in the configmap, without the .py extension.
  # For example, if the configmap contains a file called "mylogging.py" that contains a logging dictionary called PROD,
  # then argus.djangoLoggingModule should be set to "arguslogging.mylogging.PROD". arguslogging is the folder the
  # configmap is mounted to.
  djangoLoggingModuleConfigMap: ""

  databasePort: 5432
  databaseName: ""
  # Only used if postgresql.enabled is false, otherwise the
  # chart will auto generate hostname for the dependency
  databaseHost: ""

  # These are used if you do not want to use existing Kubernetes secrets
  djangoSecret: ""
  argusUsername: ""
  argusPassword: ""
  argusEmail: ""
  databaseUsername: ""
  databasePassword: ""
  # Optional way to define connection to database, with a url like "postgres://user:password@hostname:port/database".
  # If this is set, it overrides the other database connection settings.
  databaseUrl: ""

  # Available in container as environment variable ARGUS_RT_TOKEN. Not used by default.
  rtToken: ""

  # Name of k8s secret containing database credentials
  databaseExistingSecret: ""
  # Name of k8s secret containing initial admin user credentials and django secret key
  argusExistingSecret: ""
  # Name of k8s secret containing RT token secret
  rtExistingSecret: ""
  secretKeys:
    # overrides argus.databaseUsername. Only used if databaseExistingSecret is set.
    databaseUsernameKey: ""
    # overrides argus.databasePassword. Only used if databaseExistingSecret is set.
    databasePasswordKey: ""
    # overrides argus.databaseUrl. Overrides other db settings if set. Only used if databaseExistingSecret is set.
    databaseUrlKey: ""
    # overrides argus.djangoSecret. Only used if argusExistingSecret is set.
    djangoSecretKey: ""
    # overrides argus.argusUsername. Only used if argusExistingSecret is set.
    argusUsernameKey: ""
    # overrides argus.argusPassword. Only used if argusExistingSecret is set.
    argusPasswordKey: ""
    # overrides argus.rtToken. Only used if rtExistingSecret is set
    rtTokenKey: ""

  # These values are not used by default but are useful if you need to configure SSO in your settings file.
  sso:
    # Available in container as environment variable SOCIAL_AUTH_REDIRECT_IS_HTTPS
    redirectIsHTTPS: true
    # Available in container as environment variable SOCIAL_AUTH_OIDC_ENDPOINT
    OIDCEndpoint: ""
    # Available in container as environment variable SOCIAL_AUTH_OIDC_USERNAME_KEY
    OIDCUsernameKey: ""
    # Available in container as environment variable SOCIAL_AUTH_OIDC_SCOPE
    OIDCScope: ""
    # Available in container as environment variable SOCIAL_AUTH_DATAPORTEN_KEY
    dataportenKey: ""
    # Available in container as environment variable SOCIAL_AUTH_DATAPORTEN_SECRET
    dataportenSecret: ""
    # Available in container as environment variable SOCIAL_AUTH_DATAPORTEN_EMAIL_KEY
    dataportenEmailKey: ""
    # Available in container as environment variable SOCIAL_AUTH_DATAPORTEN_EMAIL_SECRET
    dataportenEmailSecret: ""
    # Available in container as environment variable SOCIAL_AUTH_DATAPORTEN_FEIDE_KEY
    dataportenFeideKey: ""
    # Available in container as environment variable SOCIAL_AUTH_DATAPORTEN_FEIDE_SECRET
    dataportenFeideSecret: ""
    # Available in container as environment variable SOCIAL_AUTH_OIDC_KEY
    OIDCKey: ""
    # Available in container as environment variable SOCIAL_AUTH_OIDC_SECRET
    OIDCSecret: ""

    # Name of k8s secret containing sso related secrets
    existingSecret: ""
    # These values define keys in the argus.sso.existingSecret secret. They are only used if argus.sso.existingSecret is set.
    secretKeys:
      # overrides argus.sso.dataportenKey
      dataportenKeyKey: ""
      # overrides argus.sso.dataportenSecret
      dataportenSecretKey: ""
      # overrides argus.sso.dataportenEmailKey
      dataportenEmailKeyKey: ""
      # overrides argus.sso.dataportenEmailSecret
      dataportenEmailSecretKey: ""
      # overrides argus.sso.dataportenFeideKey
      dataportenFeideKeyKey: ""
      # overrides argus.sso.dataportenFeideSecret
      dataportenFeideSecretKey: ""
      # overrides argus.sso.OIDCKey
      OIDCKeyKey: ""
      # overrides argus.sso.OIDCSecret
      OIDCSecretKey: ""
